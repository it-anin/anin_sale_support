<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Preview - Page Transitions</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #faf8f5;
      color: #2d2a26;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    h1 {
      margin-bottom: 2rem;
      color: #2d2a26;
    }

    .controls {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: 2px solid #d4af37;
      border-radius: 8px;
      background: white;
      color: #2d2a26;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn:hover {
      background: linear-gradient(135deg, #d4af37, #f2d98d);
      border-color: #f2d98d;
      transform: translateY(-2px);
    }

    .btn.active {
      background: linear-gradient(135deg, #d4af37, #f2d98d);
      border-color: #f2d98d;
    }

    .preview-area {
      width: 100%;
      max-width: 800px;
      height: 400px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .content-box {
      padding: 2rem;
      background: linear-gradient(135deg, #2d2a26 0%, #4a443d 100%);
      color: #faf8f5;
      border-radius: 12px;
      text-align: center;
      min-width: 300px;
    }

    .content-box h2 {
      margin-bottom: 0.5rem;
    }

    .content-box p {
      opacity: 0.9;
    }

    /* Animation 1: Fade In Slide Up (Current) */
    .fadeInSlideUp {
      animation: fadeInSlideUp 0.4s ease-out;
    }

    @keyframes fadeInSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Animation 2: Fade In */
    .fadeIn {
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Animation 3: Slide In Right */
    .slideInRight {
      animation: slideInRight 0.4s ease-out;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Animation 4: Slide In Left */
    .slideInLeft {
      animation: slideInLeft 0.4s ease-out;
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Animation 5: Scale In */
    .scaleIn {
      animation: scaleIn 0.4s ease-out;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Animation 6: Bounce In */
    .bounceIn {
      animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes bounceIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Animation 7: Rotate In */
    .rotateIn {
      animation: rotateIn 0.5s ease-out;
    }

    @keyframes rotateIn {
      from {
        opacity: 0;
        transform: rotate(-5deg) scale(0.95);
      }
      to {
        opacity: 1;
        transform: rotate(0) scale(1);
      }
    }

    /* Animation 8: Flip */
    .flip {
      animation: flip 0.6s ease-out;
    }

    @keyframes flip {
      from {
        opacity: 0;
        transform: perspective(400px) rotateY(-90deg);
      }
      to {
        opacity: 1;
        transform: perspective(400px) rotateY(0);
      }
    }

    .info {
      margin-top: 2rem;
      padding: 1rem 2rem;
      background: #fff9e6;
      border-radius: 8px;
      border-left: 4px solid #d4af37;
      max-width: 800px;
    }

    .info h3 {
      margin-bottom: 0.5rem;
      color: #2d2a26;
    }

    .info p {
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>🎨 Page Transition Animations</h1>

  <div class="controls">
    <button class="btn active" onclick="playAnimation('fadeInSlideUp')">Fade In Slide Up (Current)</button>
    <button class="btn" onclick="playAnimation('fadeIn')">Fade In</button>
    <button class="btn" onclick="playAnimation('slideInRight')">Slide In Right</button>
    <button class="btn" onclick="playAnimation('slideInLeft')">Slide In Left</button>
    <button class="btn" onclick="playAnimation('scaleIn')">Scale In</button>
    <button class="btn" onclick="playAnimation('bounceIn')">Bounce In</button>
    <button class="btn" onclick="playAnimation('rotateIn')">Rotate In</button>
    <button class="btn" onclick="playAnimation('flip')">Flip</button>
  </div>

  <div class="preview-area">
    <div class="content-box fadeInSlideUp" id="contentBox">
      <h2>📄 Content Page</h2>
      <p>This is a preview of the page transition animation</p>
    </div>
  </div>

  <div class="info">
    <h3>ℹ️ วิธีใช้</h3>
    <p>คลิกที่ปุ่มด้านบนเพื่อดูตัวอย่างอนิเมชั่นแต่ละแบบ หากต้องการใช้อนิเมชั่นใด ให้คัดลอก CSS จากไฟล์นี้ไปใส่ใน App.css และเปลี่ยนชื่อ class ใน animation property</p>
  </div>

  <script>
    function playAnimation(animationName) {
      const contentBox = document.getElementById('contentBox');
      
      // Remove all animation classes
      contentBox.className = 'content-box';
      
      // Trigger reflow to restart animation
      void contentBox.offsetWidth;
      
      // Add new animation class
      contentBox.classList.add(animationName);
      
      // Update button states
      document.querySelectorAll('.btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
